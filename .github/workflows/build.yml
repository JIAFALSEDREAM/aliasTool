name: 构建 Windows 可执行文件

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 MSVC 环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 编译资源文件
        run: rc app.rc

      - name: 编译
        run: cl /nologo /O2 /EHsc /Fe:aliasTool.exe *.c app.res

      - name: 上传 exe 到 Action 页面
        uses: actions/upload-artifact@v4
        with:
          name: aliasTool
          path: aliasTool.exe
          retention-days: 7

      - name: 创建 Release 并上传 exe
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: aliasTool.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
